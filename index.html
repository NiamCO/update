<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Niam Made This</title>
  <link rel="icon" type="image/x-icon" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }

    /* ---------- EPIC Minecraft Update Overlay ---------- */
    @keyframes glowPulse {
      0%, 100% { 
        box-shadow: 
          0 0 30px rgba(53, 200, 149, 0.6),
          0 0 60px rgba(53, 200, 149, 0.4),
          inset 0 0 20px rgba(53, 200, 149, 0.2);
      }
      50% { 
        box-shadow: 
          0 0 50px rgba(53, 200, 149, 0.9),
          0 0 100px rgba(53, 200, 149, 0.6),
          inset 0 0 30px rgba(53, 200, 149, 0.3);
      }
    }

    @keyframes floatAnimation {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px) scale(1); }
      50% { transform: translate(-50%, -50%) translateY(-10px) scale(1.02); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
    }

    .overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #0e1434 0%, #1a2147 50%, #0e1434 100%);
      padding: 40px;
      width: 420px;
      border-radius: 20px;
      text-align: center;
      z-index: 10000000;
      border: 3px solid #35c895;
      animation: glowPulse 2s infinite, floatAnimation 3s ease-in-out infinite;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: none;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .overlay::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      background: linear-gradient(
        45deg,
        #35c895,
        #06b6d4,
        #fbbf24,
        #a855f7,
        #35c895
      );
      border-radius: 20px;
      z-index: -1;
      opacity: 0.6;
      filter: blur(8px);
      animation: shimmer 3s linear infinite;
      background-size: 200% 100%;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #35c895, #06b6d4, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(53, 200, 149, 0.5);
      animation: shimmer 2s linear infinite;
      background-size: 200% 100%;
    }

    .update-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
      animation: sparkle 1.5s infinite;
    }

    .overlay p {
      margin: 0 0 10px;
      font-size: 16px;
      color: #e0e0e0;
      line-height: 1.6;
    }

    .feature-list {
      text-align: left;
      margin: 20px 0;
      padding: 0;
      list-style: none;
    }

    .feature-list li {
      padding: 8px 0;
      font-size: 14px;
      color: #35c895;
      position: relative;
      padding-left: 28px;
    }

    .feature-list li::before {
      content: '⭐';
      position: absolute;
      left: 0;
      animation: sparkle 2s infinite;
      animation-delay: calc(var(--i) * 0.2s);
    }

    .overlay button {
      width: 100%;
      padding: 16px 24px;
      margin-top: 12px;
      background: linear-gradient(135deg, #35c895, #2aa876);
      color: #0e1434;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 6px 0 #1d7c59,
        0 0 30px rgba(53, 200, 149, 0.6);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .overlay button:hover {
      transform: translateY(-3px);
      filter: brightness(1.15);
      box-shadow:
        0 8px 0 #1d7c59,
        0 0 40px rgba(53, 200, 149, 0.8);
    }

    .overlay button:active {
      transform: translateY(2px);
      box-shadow:
        0 3px 0 #1d7c59,
        0 0 20px rgba(53, 200, 149, 0.5);
    }

    .close-btn {
      background: linear-gradient(135deg, #6b7280, #4b5563) !important;
      box-shadow: 0 4px 0 #374151, 0 0 20px rgba(107, 114, 128, 0.4) !important;
      font-size: 14px !important;
      padding: 12px 20px !important;
    }

    .close-btn:hover {
      filter: brightness(1.1) !important;
      box-shadow: 0 5px 0 #374151, 0 0 25px rgba(107, 114, 128, 0.5) !important;
    }

    .close-btn:active {
      box-shadow: 0 2px 0 #374151, 0 0 15px rgba(107, 114, 128, 0.3) !important;
    }

    .overlay label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      font-size: 13px;
      color: #a0a0a0;
      cursor: pointer;
      user-select: none;
      justify-content: center;
    }

    .overlay input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid #35c895;
      background: #0e1434;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .overlay input[type="checkbox"]:checked {
      background: #35c895;
      border-color: #35c895;
    }

    .overlay input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 6px;
      width: 4px;
      height: 9px;
      border: solid #0e1434;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* Sparkles decoration */
    .sparkles {
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 24px;
      animation: sparkle 1s infinite;
    }

    /* ---------- Chat UI ---------- */
    #chatToggleBtn {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 999999;
      background: transparent;
      color: rgba(255, 180, 106, 0.8);
      border: none;
      padding: 2px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      cursor: pointer;
      text-shadow:
        0 0 4px rgba(255,120,0,0.6),
        0 0 8px rgba(255,120,0,0.4);
      opacity: 0.6;
      transition: opacity .15s ease, transform .15s ease, text-shadow .15s ease;
    }

    #chatToggleBtn:hover {
      opacity: 1;
      transform: scale(1.08);
      text-shadow:
        0 0 6px rgba(255,120,0,0.9),
        0 0 14px rgba(255,120,0,0.6);
    }

    #chatToggleBtn:active {
      transform: scale(0.92);
    }

    #chatSidebar {
      position: fixed;
      top: 0;
      right: -360px;
      width: 360px;
      height: 100vh;
      background: #0c0c0c;
      border-left: 2px solid #ff7a00;
      z-index: 999998;
      transition: right 0.3s cubic-bezier(.25,.8,.25,1);
      box-shadow: -7px 0 14px rgba(255,120,0,0.25);
    }

    #chatSidebar.open { right: 0; }
    #chatFrame { width: 100%; height: 100%; border: none; }

    .game-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #fbbf24, #ef4444);
    padding: 40px;
    border-radius: 20px;
    width: 80%;
    max-width: 600px;
    text-align: center;
    z-index: 10000001;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    opacity: 0;
  }

  .game-popup.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  .game-popup h1 {
    font-size: 48px;
    margin-bottom: 20px;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  .game-popup h2 {
    font-size: 32px;
    margin-bottom: 20px;
    color: #ffffff;
    text-shadow: 0 0 8px rgba(0,0,0,0.5);
  }

  .game-popup p {
    font-size: 20px;
    margin-bottom: 20px;
    color: #fff;
  }

  .game-popup a {
    display: inline-block;
    background: #35c895;
    color: #0e1434;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    text-decoration: none;
    margin-bottom: 20px;
    box-shadow: 0 4px 12px rgba(53,200,149,0.4);
    transition: background 0.3s ease;
  }

  .game-popup a:hover {
    background: #2aa876;
  }

  #closePopup {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #6b7280;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  #closePopup:hover {
    background: #4b5563;
  }
  </style>
</head>

<body>
  <iframe src="https://niamco.github.io/macvg"></iframe>
  <div id="gamePopup" class="game-popup">
  <h1>🎉 New Game Alert! 🎉</h1>
  <h2>Online Hangman</h2>
  <p>Self-explanatory and fun! Try to guess the word before the hangman is complete.</p>
  <a href="https://niamco.github.io/onlinehangman" target="_blank">Play Online Hangman</a>
  <button id="closePopup">Close</button>
</div>

  

 
 
  <script>
    const sidebar = document.getElementById("chatSidebar");

      window.addEventListener('load', () => {
    const popup = document.getElementById('gamePopup');
    const closeBtn = document.getElementById('closePopup');

    // Show the popup with animation
    popup.classList.add('show');

    // Close button handler
    closeBtn.addEventListener('click', () => {
      popup.classList.remove('show');
    });
  });
    

    
  </script>
</body>
</html>
