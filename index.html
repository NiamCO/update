<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>

<body>
  <iframe src="https://niamco.github.io/macvg"></iframe>

  <div id="gamePopup" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fbbf24;padding:40px;border-radius:20px;text-align:center;transition:0.3s;opacity:0;">
    <h1>🎉 New Game Alert! 🎉</h1>
    <h2>Online Hangman</h2>
    <p>Try to guess the word before the hangman is complete.</p>
    <a href="https://niamco.github.io/onlinehangman" target="_blank">Play</a><br><br>
    <button id="closePopup">Close</button>
  </div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, doc, setDoc, getDoc, updateDoc, increment, serverTimestamp, collection, addDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
  authDomain: "macvg-analytics.firebaseapp.com",
  projectId: "macvg-analytics",
  storageBucket: "macvg-analytics.firebasestorage.app",
  messagingSenderId: "976855922439",
  appId: "1:976855922439:web:e091863ce7174587db77a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------- UTIL ----------
function getUserId() {
  let id = localStorage.getItem("uid");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("uid", id);
  }
  return id;
}

function getDeviceType() {
  const ua = navigator.userAgent;
  if (/mobile/i.test(ua)) return "Mobile";
  if (/tablet/i.test(ua)) return "Tablet";
  return "Desktop";
}

function isNewSession() {
  const last = localStorage.getItem("lastVisit");
  const now = Date.now();
  if (!last || now - last > 30 * 60 * 1000) {
    localStorage.setItem("lastVisit", now);
    return true;
  }
  localStorage.setItem("lastVisit", now);
  return false;
}

// ---------- GEO (IP) ----------
async function getLocation() {
  try {
    const res = await fetch("https://ipapi.co/json/");
    return await res.json();
  } catch {
    return {};
  }
}

// ---------- MAIN ----------
async function runAnalytics() {
  const uid = getUserId();
  const newSession = isNewSession();
  const today = new Date().toISOString().split("T")[0];

  const globalRef = doc(db, "analytics", "global");
  const dailyRef = doc(db, "analytics_daily", today);
  const userRef = doc(db, "users", uid);

  const location = await getLocation();
  const device = getDeviceType();

  let isNewUser = false;

  try {
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      isNewUser = true;

      await setDoc(userRef, {
        firstSeen: serverTimestamp(),
        visits: 1,
        device,
        country: location.country_name || "Unknown"
      });

      await updateDoc(globalRef, { totalUsers: increment(1) });
    } else {
      await updateDoc(userRef, {
        visits: increment(1),
        lastSeen: serverTimestamp()
      });
    }

    // SESSION
    if (newSession) {
      await updateDoc(globalRef, { sessions: increment(1) });

      const dailySnap = await getDoc(dailyRef);
      if (!dailySnap.exists()) {
        await setDoc(dailyRef, {
          date: today,
          users: 1,
          sessions: 1
        });
      } else {
        await updateDoc(dailyRef, {
          sessions: increment(1)
        });
      }
    }

    // PAGE VIEW
    await updateDoc(globalRef, { pageViews: increment(1) });

    // EVENT: page load
    await addDoc(collection(db, "events"), {
      type: "page_load",
      uid,
      page: location.href,
      device,
      country: location.country_name,
      time: serverTimestamp(),
      referrer: document.referrer || "direct"
    });

    // ---------- CONSOLE UI ----------
    const globalData = (await getDoc(globalRef)).data();
    const dailyData = (await getDoc(dailyRef)).data();

    console.clear();
    console.log("%c📊 MACVG ANALYTICS DASHBOARD", "color:#35c895;font-size:18px;font-weight:bold;");
    console.log("====================================");

    console.log("%c👥 USERS", "color:#06b6d4;font-weight:bold;");
    console.log("Total:", globalData.totalUsers, "| New:", isNewUser ? "YES" : "NO");

    console.log("%c📅 TODAY", "color:#fbbf24;font-weight:bold;");
    console.log("Users:", dailyData?.users, "| Sessions:", dailyData?.sessions);

    console.log("%c🌍 TRAFFIC", "color:#a855f7;font-weight:bold;");
    console.log("Country:", location.country_name, "| City:", location.city);

    console.log("%c📱 DEVICE", "color:#ef4444;font-weight:bold;");
    console.log(device);

    console.log("%c📄 PAGE", "color:#10b981;font-weight:bold;");
    console.log("Views:", globalData.pageViews);
    console.log("Referrer:", document.referrer || "direct");

  } catch (err) {
    console.error("Analytics error:", err);
  }

  // TIME TRACK
  const start = Date.now();
  window.addEventListener("beforeunload", async () => {
    const time = Math.round((Date.now() - start) / 1000);

    await addDoc(collection(db, "events"), {
      type: "time_spent",
      uid,
      seconds: time,
      time: serverTimestamp()
    });
  });

  // CLICK HEATMAP
  document.addEventListener("click", async (e) => {
    await addDoc(collection(db, "events"), {
      type: "click",
      x: e.clientX,
      y: e.clientY,
      page: window.location.href,
      uid,
      time: serverTimestamp()
    });
  });
}

// ---------- CUSTOM EVENT TRACKING ----------
window.trackEvent = async function(name, data = {}) {
  await addDoc(collection(db, "events"), {
    type: name,
    ...data,
    time: serverTimestamp()
  });
};

// RUN
window.addEventListener("load", runAnalytics);
</script>
</body>
</html>
