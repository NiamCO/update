<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>

<body>
  <iframe src="https://niamco.github.io/macvg"></iframe>

  <div id="gamePopup" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fbbf24;padding:40px;border-radius:20px;text-align:center;transition:0.3s;opacity:0;">
    <h1>🎉 New Game Alert! 🎉</h1>
    <h2>Online Hangman</h2>
    <p>Try to guess the word before the hangman is complete.</p>
    <a href="https://niamco.github.io/onlinehangman" target="_blank">Play</a><br><br>
    <button id="closePopup">Close</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, increment,
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
  authDomain: "macvg-analytics.firebaseapp.com",
  projectId: "macvg-analytics",
  storageBucket: "macvg-analytics.firebasestorage.app",
  messagingSenderId: "976855922439",
  appId: "1:976855922439:web:e091863ce7174587db77a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------- USER ----------
const uid = localStorage.uid || (localStorage.uid = crypto.randomUUID());

// ---------- DEVICE ----------
function device() {
  if (/mobile/i.test(navigator.userAgent)) return "Mobile";
  if (/tablet/i.test(navigator.userAgent)) return "Tablet";
  return "Desktop";
}

// ---------- LOCATION (FIXED) ----------
async function getLocation() {
  let loc = { country: "Unknown", city: "Unknown" };

  // IP-based
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    loc.country = data.country_name;
    loc.city = data.city;
  } catch {}

  // GPS (only if allowed)
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        loc.gps = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
      },
      () => {}
    );
  }

  return loc;
}

// ---------- HEARTBEAT ----------
async function heartbeat() {
  const ref = doc(db, "users", uid);
  await updateDoc(ref, { lastActive: Date.now() });
}
setInterval(heartbeat, 5000);

// ---------- MAIN ----------
async function runAnalytics() {
  console.clear();

  const userRef = doc(db, "users", uid);
  const location = await getLocation();

  const snap = await getDoc(userRef);

  if (!snap.exists()) {
    await setDoc(userRef, {
      visits: 1,
      device: device(),
      country: location.country,
      city: location.city,
      gps: location.gps || "not allowed",
      firstSeen: Date.now(),
      lastActive: Date.now()
    });
  } else {
    await updateDoc(userRef, {
      visits: increment(1),
      lastActive: Date.now()
    });
  }

  renderDashboard();
}

// ---------- INSANE DASHBOARD ----------
async function renderDashboard() {
  const usersSnap = await getDocs(collection(db, "users"));
  const now = Date.now();

  let online = 0;

  console.log("%c██████╗  █████╗ ███████╗██╗  ██╗", "color:#00ffcc;font-weight:bold;");
  console.log("%c██╔══██╗██╔══██╗██╔════╝██║ ██╔╝", "color:#00ffcc;");
  console.log("%c██████╔╝███████║███████╗█████╔╝ ", "color:#00ffcc;");
  console.log("%c██╔══██╗██╔══██║╚════██║██╔═██╗ ", "color:#00ffcc;");
  console.log("%c██████╔╝██║  ██║███████║██║  ██╗", "color:#00ffcc;");
  console.log("%c╚═════╝ ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝", "color:#00ffcc;");

  console.log("%c⚡ MACVG LIVE CONTROL PANEL ⚡", "color:#ffd700;font-size:18px;font-weight:bold;");
  console.log("══════════════════════════════════════");

  usersSnap.forEach((docSnap, i) => {
    const u = docSnap.data();
    const isOnline = now - (u.lastActive || 0) < 30000;

    if (isOnline) online++;

    console.groupCollapsed(
      `%c👤 user${i+1} ${isOnline ? "🟢 ONLINE" : "⚫ OFFLINE"}`,
      `color:${isOnline ? "#00ff99" : "#888"};font-weight:bold;`
    );

    console.log("🆔 ID:", docSnap.id);
    console.log("🌍 Country:", u.country);
    console.log("🏙 City:", u.city);
    console.log("📍 GPS:", u.gps);
    console.log("📱 Device:", u.device);
    console.log("🔁 Visits:", u.visits);
    console.log("⏱ Last Active:", new Date(u.lastActive).toLocaleString());

    console.groupEnd();
  });

  console.log("══════════════════════════════════════");
  console.log(`🟢 ONLINE USERS: ${online}`);
  console.log(`👥 TOTAL USERS: ${usersSnap.size}`);
}

// RUN
window.addEventListener("load", runAnalytics);
</script>
</body>
</html>
