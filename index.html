<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>

<body>
  <iframe src="https://niamco.github.io/macvg"></iframe>

  <div id="gamePopup" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fbbf24;padding:40px;border-radius:20px;text-align:center;transition:0.3s;opacity:0;">
    <h1>🎉 New Game Alert! 🎉</h1>
    <h2>Online Hangman</h2>
    <p>Try to guess the word before the hangman is complete.</p>
    <a href="https://niamco.github.io/onlinehangman" target="_blank">Play</a><br><br>
    <button id="closePopup">Close</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, increment,
  serverTimestamp, collection, addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
  authDomain: "macvg-analytics.firebaseapp.com",
  projectId: "macvg-analytics",
  storageBucket: "macvg-analytics.firebasestorage.app",
  messagingSenderId: "976855922439",
  appId: "1:976855922439:web:e091863ce7174587db77a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------- UTIL ----------
const uid = localStorage.uid || (localStorage.uid = crypto.randomUUID());

function device() {
  if (/mobile/i.test(navigator.userAgent)) return "Mobile";
  if (/tablet/i.test(navigator.userAgent)) return "Tablet";
  return "Desktop";
}

function newSession() {
  const now = Date.now();
  const last = localStorage.lastVisit;
  if (!last || now - last > 30 * 60 * 1000) {
    localStorage.lastVisit = now;
    return true;
  }
  localStorage.lastVisit = now;
  return false;
}

async function geo() {
  try {
    return await (await fetch("https://ipapi.co/json/")).json();
  } catch { return {}; }
}

// ---------- TRACKERS ----------
let clicks = 0;
let rageClicks = 0;
let lastClickTime = 0;
let scrollMax = 0;
let firstActionTime = null;
let idleTime = 0;
let lastMove = Date.now();

// idle tracker
setInterval(() => {
  if (Date.now() - lastMove > 5000) idleTime++;
}, 1000);

["mousemove","keydown","click"].forEach(e =>
  document.addEventListener(e, () => lastMove = Date.now())
);

// scroll depth
window.addEventListener("scroll", () => {
  const depth = (window.scrollY + window.innerHeight) / document.body.scrollHeight;
  scrollMax = Math.max(scrollMax, depth);
});

// clicks + rage clicks
document.addEventListener("click", async (e) => {
  clicks++;

  const now = Date.now();
  if (now - lastClickTime < 300) rageClicks++;
  lastClickTime = now;

  if (!firstActionTime) firstActionTime = now;

  await addDoc(collection(db, "events"), {
    type: "click",
    x: e.clientX,
    y: e.clientY,
    uid,
    time: serverTimestamp()
  });
});

// ---------- MAIN ----------
async function runAnalytics() {
  const today = new Date().toISOString().split("T")[0];
  const globalRef = doc(db, "analytics", "global");
  const dailyRef = doc(db, "analytics_daily", today);
  const userRef = doc(db, "users", uid);

  const location = await geo();
  const isSession = newSession();
  let isNewUser = false;

  try {
    // ensure global
    if (!(await getDoc(globalRef)).exists()) {
      await setDoc(globalRef, { users:0, sessions:0, views:0 });
    }

    // user
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) {
      isNewUser = true;
      await setDoc(userRef, { firstSeen: serverTimestamp(), visits:1 });
      await updateDoc(globalRef, { users: increment(1) });
    } else {
      await updateDoc(userRef, { visits: increment(1) });
    }

    // session
    if (isSession) {
      await updateDoc(globalRef, { sessions: increment(1) });

      if (!(await getDoc(dailyRef)).exists()) {
        await setDoc(dailyRef, { users: isNewUser?1:0, sessions:1 });
      } else {
        await updateDoc(dailyRef, {
          sessions: increment(1),
          ...(isNewUser && { users: increment(1) })
        });
      }
    }

    // page view
    await updateDoc(globalRef, { views: increment(1) });

    // -------- TIME TRACK --------
    const start = Date.now();
    window.addEventListener("beforeunload", async () => {
      const time = Math.round((Date.now() - start)/1000);
      const engagement = time + clicks*2;

      await addDoc(collection(db, "events"), {
        type: "session_end",
        uid,
        timeSpent: time,
        clicks,
        rageClicks,
        scrollDepth: Math.round(scrollMax*100),
        idleTime,
        engagement,
        time: serverTimestamp()
      });
    });

    // -------- DASHBOARD --------
    const g = (await getDoc(globalRef)).data();
    const d = (await getDoc(dailyRef)).data();

    console.clear();

    console.log("%c🚀 MACVG GOD MODE ANALYTICS", "color:#00ffcc;font-size:20px;font-weight:bold;");
    console.log("======================================");

    console.log("%c👥 USERS", "color:#00c3ff;font-weight:bold;");
    console.log("Total:", g.users, "| New:", isNewUser);

    console.log("%c📅 TODAY", "color:#ffd700;font-weight:bold;");
    console.log("Users:", d?.users, "| Sessions:", d?.sessions);

    console.log("%c🌍 LOCATION", "color:#bb86fc;font-weight:bold;");
    console.log(location.country_name, "-", location.city);

    console.log("%c📱 DEVICE", "color:#ff4d4d;font-weight:bold;");
    console.log(device());

    console.log("%c⚡ ENGAGEMENT", "color:#00ff99;font-weight:bold;");
    console.log("Clicks:", clicks, "| Rage:", rageClicks);
    console.log("Scroll:", Math.round(scrollMax*100)+"%");
    console.log("Idle:", idleTime+"s");

    console.log("%c🧠 BEHAVIOR", "color:#ff7a00;font-weight:bold;");
    console.log("First Action:", firstActionTime ? ((firstActionTime - performance.timeOrigin)/1000).toFixed(1)+"s" : "none");

    console.log("%c📄 TRAFFIC", "color:#00e1ff;font-weight:bold;");
    console.log("Views:", g.views);
    console.log("Referrer:", document.referrer || "direct");

  } catch (e) {
    console.error("Analytics error:", e);
  }
}

// custom events
window.trackEvent = async (name,data={})=>{
  await addDoc(collection(db,"events"),{
    type:name,
    uid,
    ...data,
    time:serverTimestamp()
  });
};

window.addEventListener("load", runAnalytics);
</script>
</body>
</html>
