<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
html, body {
  margin:0;
  height:100%;
  background:black;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

/* ---------- OVERLAY ---------- */
#vault {
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, #050505 0%, #000 80%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999999;
  color:white;
  text-align:center;
}

/* TITLE */
.title {
  font-size:90px;
  font-weight:900;
  color:#00ffcc;
  text-shadow:
    0 0 30px #00ffcc,
    0 0 100px rgba(0,255,200,0.8);
  animation:titlePulse 3s infinite;
}

@keyframes titlePulse {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.05); }
}

/* TEXT */
.text {
  opacity:0;
  transform:translateY(50px) scale(0.95);
  font-size:26px;
  margin-top:20px;
  transition:all 1.5s cubic-bezier(.2,.8,.2,1);
}

.text.show {
  opacity:1;
  transform:translateY(0) scale(1);
}

/* BUTTON */
.btn {
  margin-top:40px;
  padding:16px 30px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#00ffcc;
  color:black;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 20px #00ffcc;
  transition:0.2s;
}

.btn:hover {
  transform:scale(1.1);
}

/* FINAL SCREEN */
#finalScreen {
  display:none;
}

.bigFinal {
  font-size:52px;
  font-weight:900;
  color:#00ffcc;
  text-shadow:0 0 40px #00ffcc;
  opacity:0;
  transform:scale(0.8);
  transition:all 1.5s ease;
}

.bigFinal.show {
  opacity:1;
  transform:scale(1.05);
}

/* VIDEO */
video {
  margin-top:30px;
  width:70%;
  max-width:800px;
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,255,200,0.4);
}
</style>
</head>

<body>

<iframe src="https://niamco.github.io/macvg"></iframe>

<div id="vault">

  <div class="title">THE VAULT</div>

  <div class="text" id="t1">A new era begins.</div>
  <div class="text" id="t2">10,000+ hours of work.</div>
  <div class="text" id="t3">2,021 games.</div>
  <div class="text" id="t4">I give you... The Vault.</div>

  <button class="btn" id="nextBtn">Next →</button>

  <!-- FINAL SCREEN -->
  <div id="finalScreen">

    <div class="bigFinal" id="finalText">
      WELCOME TO THE BIGGEST UPDATE OF YOUR LIFE
    </div>

    <div class="text show" style="margin-top:30px;">
      Huge thanks to that one kid who asked for Geometry Dash 💀
    </div>

    <!-- VIDEO -->
    <iframe src="https://drive.google.com/file/d/1PutLuva2yMsOiyt6HJGjagyII4bfl69f/preview" width="640" height="480"></iframe>

    <button class="btn" style="margin-top:30px;"
      onclick="window.open('https://drive.google.com/drive/folders/1c750lq8RBDmLXTZEUgA0TYGZsdMd7Zne?usp=sharing','_blank')">
      ENTER THE VAULT →
    </button>

  </div>

</div>

<script>
let step = 0;

const texts = [
  document.getElementById("t1"),
  document.getElementById("t2"),
  document.getElementById("t3"),
  document.getElementById("t4")
];

const nextBtn = document.getElementById("nextBtn");

nextBtn.onclick = () => {
  if (step < texts.length) {
    texts[step].classList.add("show");
    step++;
  } else {
    document.querySelectorAll(".text").forEach(t => t.style.display="none");
    nextBtn.style.display = "none";

    const final = document.getElementById("finalScreen");
    final.style.display = "block";

    setTimeout(() => {
      document.getElementById("finalText").classList.add("show");
    }, 100);
  }
};
</script>

</body>
</html>
