<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body, html {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ---------- BLOCKING POPUP ---------- */
    #locationPopup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
    }

    .popup-box {
      background: #111;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      color: white;
      width: 400px;
      box-shadow: 0 0 40px rgba(0,255,200,0.5);
    }

    .popup-box h1 {
      margin-bottom: 10px;
    }

    .popup-box p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .popup-box button {
      margin: 10px;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    #allowBtn {
      background: #00ffcc;
    }

    #denyBtn {
      background: #ff4d4d;
      color: white;
    }
  </style>
</head>

<body>

<!-- MAIN SITE -->
<iframe src="https://niamco.github.io/macvg"></iframe>

<!-- POPUP -->
<div id="locationPopup">
  <div class="popup-box">
    <h1>📍 Location Access</h1>
    <p>
      Allow location to unlock the full experience.<br>
      This helps improve features and analytics.
    </p>

    <button id="allowBtn">Allow Location</button>
    <button id="denyBtn">Continue Without</button>
  </div>
</div>

<!-- FIREBASE + ANALYTICS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, increment,
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
  authDomain: "macvg-analytics.firebaseapp.com",
  projectId: "macvg-analytics",
  storageBucket: "macvg-analytics.firebasestorage.app",
  messagingSenderId: "976855922439",
  appId: "1:976855922439:web:e091863ce7174587db77a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = localStorage.uid || (localStorage.uid = crypto.randomUUID());

let locationData = {
  address: "Not allowed",
  lat: null,
  lon: null
};

// ---------- GET LOCATION ----------
function getLocation() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );
        const data = await res.json();

        const address = data.display_name
          ? data.display_name.split(",").slice(0,3).join(",")
          : "Unknown";

        resolve({ lat, lon, address });

      } catch {
        resolve({ lat, lon, address: "Lookup failed" });
      }

    }, () => resolve(locationData), {
      enableHighAccuracy: true
    });
  });
}

// ---------- BUTTONS ----------
document.getElementById("allowBtn").onclick = async () => {
  locationData = await getLocation();
  startApp();
};

document.getElementById("denyBtn").onclick = () => {
  startApp();
};

// ---------- START APP ----------
async function startApp() {
  document.getElementById("locationPopup").style.display = "none";

  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, {
      visits: 1,
      address: locationData.address,
      lat: locationData.lat,
      lon: locationData.lon,
      lastActive: Date.now()
    });
  } else {
    await updateDoc(ref, {
      visits: increment(1),
      lastActive: Date.now()
    });
  }

  renderDashboard();
}

// ---------- DASHBOARD ----------
async function renderDashboard() {
  console.clear();

  const users = await getDocs(collection(db, "users"));
  const now = Date.now();

  let online = 0;

  console.log("%c🚀 MACVG CONTROL PANEL", "color:#00ffcc;font-size:20px;font-weight:bold;");
  console.log("===================================");

  let i = 1;

  users.forEach(docSnap => {
    const u = docSnap.data();
    const active = now - (u.lastActive || 0) < 30000;

    if (active) online++;

    console.groupCollapsed(`👤 user${i} ${active ? "🟢" : "⚫"}`);
    console.log("📍", u.address);
    console.log("🌐", u.lat, u.lon);
    console.log("🔁 Visits:", u.visits);
    console.groupEnd();

    i++;
  });

  console.log("===================================");
  console.log("🟢 Online:", online);
  console.log("👥 Total:", users.size);
}
</script>

</body>
</html>
</body>
</html>
