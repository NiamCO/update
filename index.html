<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* -------- POPUP -------- */
    #adPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: #111;
      color: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      z-index: 999999;
      box-shadow: 0 0 40px rgba(0,255,200,0.4);
      opacity: 0;
      transition: all 0.3s ease;
      width: 320px;
    }

    #adPopup h2 {
      margin: 0 0 10px;
    }

    #adPopup p {
      color: #ccc;
      font-size: 14px;
    }

    #closeAd {
      margin-top: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- MAIN SITE -->
<iframe src="https://niamco.github.io/macvg"></iframe>

<!-- AD POPUP -->
<div id="adPopup">
  <h2>💻 Need a Website?</h2>

  <p>
    I build clean, custom websites for super cheap.<br><br>
    💸 Only $1–$3
  </p>

  <p style="font-size:13px; color:#aaa;">
    Contact me:<br>
    <b>niamnangalia@outlook.com</b>
  </p>

  <button id="closeAd">Got it 👍</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, increment,
  collection, getDocs, addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ---------- FIREBASE ----------
const firebaseConfig = {
  apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
  authDomain: "macvg-analytics.firebaseapp.com",
  projectId: "macvg-analytics",
  storageBucket: "macvg-analytics.firebasestorage.app",
  messagingSenderId: "976855922439",
  appId: "1:976855922439:web:e091863ce7174587db77a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------- USER ----------
const uid = localStorage.uid || (localStorage.uid = crypto.randomUUID());

// ---------- TRACKING ----------
let clicks = 0;
let rageClicks = 0;
let lastClick = 0;
let scrollMax = 0;
let startTime = Date.now();

// scroll tracking
window.addEventListener("scroll", () => {
  const depth = (window.scrollY + window.innerHeight) / document.body.scrollHeight;
  scrollMax = Math.max(scrollMax, depth);
});

// click tracking
document.addEventListener("click", () => {
  clicks++;
  const now = Date.now();
  if (now - lastClick < 300) rageClicks++;
  lastClick = now;
});

// heartbeat (online tracking)
setInterval(async () => {
  try {
    await updateDoc(doc(db, "users", uid), {
      lastActive: Date.now()
    });
  } catch {}
}, 5000);

// ---------- MAIN ----------
async function run() {
  console.clear();

  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, {
      visits: 1,
      firstSeen: Date.now(),
      lastActive: Date.now()
    });
  } else {
    await updateDoc(ref, {
      visits: increment(1),
      lastActive: Date.now()
    });
  }

  renderDashboard();
}

// session tracking
window.addEventListener("beforeunload", async () => {
  const timeSpent = Math.round((Date.now() - startTime) / 1000);

  await addDoc(collection(db, "sessions"), {
    uid,
    timeSpent,
    clicks,
    rageClicks,
    scrollDepth: Math.round(scrollMax * 100),
    time: Date.now()
  });
});

// ---------- DASHBOARD ----------
async function renderDashboard() {
  const usersSnap = await getDocs(collection(db, "users"));
  const sessionsSnap = await getDocs(collection(db, "sessions"));

  const now = Date.now();
  let online = 0;
  let totalClicks = 0;
  let totalTime = 0;

  sessionsSnap.forEach(doc => {
    const s = doc.data();
    totalClicks += s.clicks || 0;
    totalTime += s.timeSpent || 0;
  });

  console.log("%c🚀 MACVG ANALYTICS HUB", "color:#00ffcc;font-size:20px;font-weight:bold;");
  console.log("══════════════════════════════════════");

  let i = 1;

  usersSnap.forEach(docSnap => {
    const u = docSnap.data();
    const active = now - (u.lastActive || 0) < 30000;

    if (active) online++;

    console.groupCollapsed(
      `%c👤 user${i} ${active ? "🟢 ONLINE" : "⚫ OFFLINE"}`,
      `color:${active ? "#00ff99" : "#888"};font-weight:bold;`
    );

    console.log("🆔 ID:", docSnap.id);
    console.log("🔁 Visits:", u.visits);
    console.log("⏱ Last Active:", new Date(u.lastActive).toLocaleTimeString());

    console.groupEnd();
    i++;
  });

  console.log("══════════════════════════════════════");

  console.log("%c📊 GLOBAL STATS", "color:#ffd700;font-weight:bold;");
  console.log("👥 Total Users:", usersSnap.size);
  console.log("🟢 Online:", online);
  console.log("🖱 Total Clicks:", totalClicks);
  console.log("⏱ Total Time:", totalTime + "s");

  console.log("%c⚡ YOUR SESSION", "color:#00e1ff;font-weight:bold;");
  console.log("Clicks:", clicks);
  console.log("Rage Clicks:", rageClicks);
  console.log("Scroll Depth:", Math.round(scrollMax * 100) + "%");
}

// ---------- POPUP ----------
if (!localStorage.seenAd) {
  setTimeout(() => {
    const popup = document.getElementById("adPopup");
    popup.style.opacity = "1";
    popup.style.transform = "translate(-50%,-50%) scale(1)";
    localStorage.seenAd = "true";
  }, 3000);
}

document.getElementById("closeAd").onclick = () => {
  const popup = document.getElementById("adPopup");
  popup.style.opacity = "0";
  popup.style.transform = "translate(-50%,-50%) scale(0.8)";
};

// START
window.addEventListener("load", run);
</script>

</body>
</html>
