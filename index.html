<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>

<body>
  <iframe src="https://niamco.github.io/macvg"></iframe>

  <div id="gamePopup" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fbbf24;padding:40px;border-radius:20px;text-align:center;transition:0.3s;opacity:0;">
    <h1>🎉 New Game Alert! 🎉</h1>
    <h2>Online Hangman</h2>
    <p>Try to guess the word before the hangman is complete.</p>
    <a href="https://niamco.github.io/onlinehangman" target="_blank">Play</a><br><br>
    <button id="closePopup">Close</button>
  </div>

  <!-- ✅ FIXED FIREBASE ANALYTICS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } 
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
      authDomain: "macvg-analytics.firebaseapp.com",
      projectId: "macvg-analytics",
      storageBucket: "macvg-analytics.firebasestorage.app",
      messagingSenderId: "976855922439",
      appId: "1:976855922439:web:e091863ce7174587db77a2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function runAnalytics() {
      try {
        const ref = doc(db, "analytics", "visits");
        const snap = await getDoc(ref);

        if (snap.exists()) {
          await updateDoc(ref, { count: increment(1) });
        } else {
          await setDoc(ref, { count: 1 });
        }

        const updated = await getDoc(ref);
        const count = updated.data().count;

        console.log("=== 🌍 REAL ANALYTICS ===");
        console.log("Total Visits:", count);
        console.log("Page:", window.location.href);
        console.log("Device:", navigator.userAgent);
        console.log("Screen:", screen.width + "x" + screen.height);

        const start = Date.now();
        window.addEventListener("beforeunload", () => {
          const time = Math.round((Date.now() - start) / 1000);
          console.log("⏱ Time on page:", time + "s");
        });

      } catch (err) {
        console.error("Firebase error:", err);
      }
    }

    window.addEventListener("load", () => {
      // popup
      const popup = document.getElementById("gamePopup");
      const closeBtn = document.getElementById("closePopup");

      popup.style.transform = "translate(-50%, -50%) scale(1)";
      popup.style.opacity = "1";

      closeBtn.onclick = () => {
        popup.style.transform = "translate(-50%, -50%) scale(0)";
        popup.style.opacity = "0";
      };

      // analytics
      runAnalytics();
    });
  </script>
</body>
</html>
