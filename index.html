<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="icon" type="image/x-icon" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>

<body>
  <iframe src="https://niamco.github.io/macvg"></iframe>

  <div id="gamePopup" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fbbf24;padding:40px;border-radius:20px;text-align:center;transition:0.3s;opacity:0;">
    <h1>🎉 New Game Alert! 🎉</h1>
    <h2>Online Hangman</h2>
    <p>Try to guess the word before the hangman is complete.</p>
    <a href="https://niamco.github.io/onlinehangman" target="_blank">Play</a><br><br>
    <button id="closePopup">Close</button>
  </div>

  <!-- ✅ FIXED FIREBASE ANALYTICS -->
 <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, doc, setDoc, getDoc, updateDoc, increment, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsf7-Gz4QDO-5EqxPLD_TUzyLyavRedQ",
  authDomain: "macvg-analytics.firebaseapp.com",
  projectId: "macvg-analytics",
  storageBucket: "macvg-analytics.firebasestorage.app",
  messagingSenderId: "976855922439",
  appId: "1:976855922439:web:e091863ce7174587db77a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// -------- USER ID (no refresh spam) --------
function getUserId() {
  let id = localStorage.getItem("uid");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("uid", id);
  }
  return id;
}

// -------- SESSION SYSTEM --------
function isNewSession() {
  const last = localStorage.getItem("lastVisit");
  const now = Date.now();

  if (!last || now - last > 30 * 60 * 1000) { // 30 min
    localStorage.setItem("lastVisit", now);
    return true;
  }

  localStorage.setItem("lastVisit", now);
  return false;
}

// -------- MAIN ANALYTICS --------
async function runAnalytics() {
  const uid = getUserId();
  const newSession = isNewSession();

  const today = new Date().toISOString().split("T")[0];

  const globalRef = doc(db, "analytics", "global");
  const dailyRef = doc(db, "analytics_daily", today);
  const userRef = doc(db, "users", uid);

  try {
    // -------- USER TRACKING --------
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      await setDoc(userRef, {
        firstSeen: serverTimestamp(),
        visits: 1,
        device: navigator.userAgent
      });

      // new unique user
      await updateDoc(globalRef, { totalUsers: increment(1) });
    } else {
      await updateDoc(userRef, {
        visits: increment(1),
        lastSeen: serverTimestamp()
      });
    }

    // -------- SESSION TRACKING --------
    if (newSession) {
      await updateDoc(globalRef, { sessions: increment(1) });

      const dailySnap = await getDoc(dailyRef);
      if (!dailySnap.exists()) {
        await setDoc(dailyRef, {
          date: today,
          users: 1,
          sessions: 1
        });
      } else {
        await updateDoc(dailyRef, {
          sessions: increment(1)
        });
      }
    }

    // -------- PAGE VIEW --------
    await updateDoc(globalRef, { pageViews: increment(1) });

    // -------- CONSOLE OUTPUT --------
    const globalData = (await getDoc(globalRef)).data();
    const dailyData = (await getDoc(dailyRef)).data();

    console.log("=== 📊 ADVANCED ANALYTICS ===");
    console.log("👥 Total Users:", globalData.totalUsers);
    console.log("🌍 Total Sessions:", globalData.sessions);
    console.log("📄 Page Views:", globalData.pageViews);

    console.log("📅 Today:", today);
    console.log("👤 Daily Users:", dailyData?.users);
    console.log("⚡ Daily Sessions:", dailyData?.sessions);

  } catch (err) {
    console.error("Analytics error:", err);
  }

  // -------- TIME TRACKING --------
  const start = Date.now();
  window.addEventListener("beforeunload", async () => {
    const time = Math.round((Date.now() - start) / 1000);
    console.log("⏱ Time on page:", time, "seconds");
  });
}

window.addEventListener("load", runAnalytics);
</script>
</body>
</html>
