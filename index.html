<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
html, body {
  margin:0;
  height:100%;
  background:black;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

/* ---------- CINEMATIC OVERLAY ---------- */
#vault {
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, #050505 0%, #000 80%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999999;
  color:white;
  text-align:center;
}

/* FLASH */
#flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:1;
  z-index:1000000;
  animation:flashOut 1.2s forwards;
}
@keyframes flashOut {
  to { opacity:0; pointer-events:none; }
}

/* PARTICLES */
.particle {
  position:absolute;
  width:4px;
  height:4px;
  background:#00ffcc;
  border-radius:50%;
  opacity:0.6;
  animation:float 6s infinite linear;
}
@keyframes float {
  from { transform:translateY(100vh) scale(0.5); }
  to { transform:translateY(-10vh) scale(1.2); }
}

/* TITLE */
.title {
  font-size:90px;
  font-weight:900;
  letter-spacing:6px;
  color:#00ffcc;
  text-shadow:
    0 0 20px #00ffcc,
    0 0 60px #00ffcc,
    0 0 120px rgba(0,255,200,0.8);
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.05); }
}

/* TEXT */
.text {
  opacity:0;
  transform:translateY(30px);
  font-size:26px;
  margin-top:20px;
  animation:fadeUp 1s forwards;
}

@keyframes fadeUp {
  to { opacity:1; transform:translateY(0); }
}

/* BUTTON */
.btn {
  margin-top:40px;
  padding:18px 36px;
  font-size:20px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#00ffcc,#00c2a8);
  color:black;
  font-weight:900;
  cursor:pointer;
  box-shadow:
    0 0 20px #00ffcc,
    0 0 60px rgba(0,255,200,0.7);
  transition:0.2s;
}

.btn:hover {
  transform:scale(1.1);
}

/* SKIP */
.skip {
  margin-top:20px;
  color:#888;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>

<body>

<iframe src="https://niamco.github.io/macvg"></iframe>

<div id="flash"></div>

<div id="vault">

  <!-- PARTICLES -->
  <div id="particles"></div>

  <div class="title">THE VAULT</div>

  <div class="text" style="animation-delay:1.5s;">A new era begins.</div>

  <div class="text" style="animation-delay:2.5s;">10,000+ hours of work.</div>

  <div class="text" style="animation-delay:3.5s;">2,021 games.</div>

  <div class="text" style="animation-delay:4.5s;">
    I give you... <b>The Vault.</b>
  </div>

  <div class="text" style="animation-delay:5.5s;">
    And yes... Geometry Dash is in here 💀
  </div>

  <button class="btn" style="animation-delay:6.5s;"
    onclick="window.open('https://archive.org/details/thevault_202604','_blank')">
    ENTER THE VAULT →
  </button>

  <div class="skip" onclick="closeVault()">skip</div>

</div>

<script>
// particles generator
const container = document.getElementById("particles");
for(let i=0;i<80;i++){
  const p = document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(4+Math.random()*4)+"s";
  p.style.opacity=Math.random();
  container.appendChild(p);
}

// close
function closeVault(){
  document.getElementById("vault").style.display="none";
}

// auto close after 10s
setTimeout(closeVault, 10000);
</script>

</body>
</html>
